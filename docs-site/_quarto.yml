project:
  type: website
  output-dir: _site

website:
  title: "ctms-core"
  description: "A regulatory-document backbone for clinical trials where completeness is a query, not a monitoring visit."
  site-url: https://tgerke.github.io/ctms-core/
  repo-url: https://github.com/tgerke/ctms-core
  page-navigation: true
  navbar:
    search: true
    left:
      - text: "Getting started"
        href: getting-started.qmd
      - text: "User guide"
        href: user-guide/index.qmd
      - text: "Technical guide"
        href: data-model.qmd
      - text: "Cookbook"
        href: cookbook.qmd
      - text: "Decisions"
        href: decisions.qmd
  sidebar:
    style: docked
    collapse-level: 2
    contents:
      - text: "Overview"
        href: index.qmd
      - getting-started.qmd
      - section: "User guide"
        contents:
          - user-guide/index.qmd
          - user-guide/documents.qmd
          - user-guide/monitoring-visits.qmd
          - user-guide/issues.qmd
          - user-guide/enrollment-milestones.qmd
          - user-guide/statuses.qmd
      - section: "Technical guide"
        contents:
          - data-model.qmd
          - operations.qmd
          - compliance.qmd
          - validation.qmd
      - section: "Cookbook"
        contents:
          - cookbook.qmd
          - sql-access.qmd
      - glossary.qmd
      - decisions.qmd

format:
  html:
    theme:
      light: flatly
      dark: darkly
    css: styles.css
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    lightbox: true
