services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ctms
      POSTGRES_PASSWORD: ctms
      POSTGRES_DB: ctms
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ctms"]
      interval: 2s
      timeout: 2s
      retries: 15

volumes:
  pgdata:
